<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#0A0A0F"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="55%" stop-color="transparent"/>
      <stop offset="85%" stop-color="#B0B8C8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Glow ring -->
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>
  <!-- Border -->
  <rect x="1" y="1" width="510" height="510" rx="111" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="2"/>
  <!-- Sound wave bars centered at 256,256 -->
  <!-- Heights: 44,80,132,196,248,196,132,80,44 — centered vertically -->
  <rect x="166" y="234" width="20" height="44" rx="10" fill="rgba(255,255,255,0.18)"/>
  <rect x="196" y="216" width="20" height="80" rx="10" fill="rgba(255,255,255,0.30)"/>
  <rect x="226" y="190" width="20" height="132" rx="10" fill="rgba(255,255,255,0.48)"/>
  <rect x="256" y="158" width="20" height="196" rx="10" fill="rgba(255,255,255,0.68)"/>
  <rect x="286" y="132" width="24" height="248" rx="12" fill="rgba(255,255,255,0.92)"/>
  <rect x="320" y="158" width="20" height="196" rx="10" fill="rgba(255,255,255,0.68)"/>
  <rect x="350" y="190" width="20" height="132" rx="10" fill="rgba(255,255,255,0.48)"/>
  <rect x="380" y="216" width="20" height="80" rx="10" fill="rgba(255,255,255,0.30)"/>
  <rect x="410" y="234" width="20" height="44" rx="10" fill="rgba(255,255,255,0.18)"/>
  <!-- Bottom strip -->
  <rect x="0" y="406" width="512" height="106" rx="0" fill="rgba(0,0,0,0.30)" clip-path="inset(0 0 0 0 round 0 0 112px 112px)"/>
  <rect x="0" y="405" width="512" height="1" fill="rgba(255,255,255,0.06)"/>
  <!-- Wordmark -->
  <text x="256" y="460" text-anchor="middle" font-family="'SF Pro Display','Segoe UI',sans-serif" font-size="32" font-weight="700" letter-spacing="12" fill="rgba(255,255,255,0.82)">AURA</text>
</svg>
